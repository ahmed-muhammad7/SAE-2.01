<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de Memory</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" type="module"></script>
</head>
<body>
<header><h1>Jeu de Memory</h1></header>

<div class="setup-form">
    <h2>
    Démarrer une nouvelle partie
    </h2>
</div>

<!-- Ici, on modifie le html de sorte à ce qu'il corresponde bien au CSS (en lui ajoutant le formulaire game-form et ses autres balises-->

<div class="game-area" hidden >
    <form class ="game-form">
        <div class="game-area-header">
            <input type="text" name="name" required>
            <label> Saissisez votre nom d'utilisateur </label>
                <select>
                    <option value="Animaux"> Animaux </option>
                    <option value="Fruits"> Fruits </option>
                    <option value="Cartes"> Cartes </option>
                </select>
            <label> Sélectionnez le niveau </label>
                <select>
                    <option value="Facile"> Facile </option>
                    <option value="Moyen"> Moyen </option>
                    <option value="Difficile"> Difficile </option>
                </select>
             <label>Sélectionnez le niveau de difficulté</label>
            <button type="submit" id="confirmer"> Confirmer </button>
        </div>
        <div class="game-board"> <!-- à compléter (le timer) -->
            <button id="abandon" hidden> Abandon </button>
            <p class = "game-timer"></p>
        </div>
    </form>
</div>


</body>
</html>
