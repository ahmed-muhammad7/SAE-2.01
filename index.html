<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de Memory</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" type="module"></script>
</head>
<body>
<header><h1>Jeu de Memory</h1></header>

<div class="setup-form">
  <h2>
    Démarrer une nouvelle partie
  </h2>
</div>

<!-- Ici, on modifie le html de sorte à ce qu'il corresponde bien au CSS (en lui ajoutant le formulaire game-form et ses autres balises-->

<!-- Dans form : label, input, select, un h2 dans game-area-header-->
<div class="game-area hidden "> <!-- Ne pas oublier de remettre hidden-->
    <form class ="game-form">
        <div class="game-area-header">
            <h2>
                <input type="text" name="name" required>
            </h2>Tapez votre nom d'utilisateur
        </div>
        <div class="game-board">
            <select>
                <option value="Animaux"> Animaux </option>
                <option value="Fruits"> Fruits </option>
                <option value="Cartes"> Cartes </option>
            </select>
            <select>
                <option value="Facile"> Facile </option>
                <option value="Moyen"> Moyen </option>
                <option value="Difficile"> Difficile </option>
            </select>
            <button> Envoyer </button>
        </div>
    </form>
</div>

</body>
</html>
